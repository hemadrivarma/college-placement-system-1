{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">
                    <h3 class="text-center">Edit Profile</h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   name="fullname"
                                   class="form-control"
                                   value="{{ student.fullname }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   value="{{ student.email }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   value="{{ student.phone }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text"
                                   name="department"
                                   class="form-control"
                                   value="{{ student.department }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">CGPA</label>
                            <input type="number"
                                   step="0.01"
                                   name="cgpa"
                                   class="form-control"
                                   value="{{ student.cgpa }}"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Update Profile
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/profile" class="btn btn-secondary">
                            Back to Profile
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
