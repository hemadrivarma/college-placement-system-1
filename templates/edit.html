{% extends "base.html" %}

{% block title %}
Edit Student
{% endblock %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST">

Full Name<br>
<input type="text" name="fullname" value="{{ student.fullname }}"><br><br>

Email<br>
<input type="email" name="email" value="{{ student.email }}"><br><br>

Phone<br>
<input type="text" name="phone" value="{{ student.phone }}"><br><br>

Department<br>
<input type="text" name="department" value="{{ student.department }}"><br><br>

<input type="submit" value="Update Student">

</form>

{% endblock %}
